name: Deploy Nginx Config

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  deploy-nginx:
    name: Deploy Nginx Configuration
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy nginx config
        run: |
          echo "Deploying nginx configuration..."
          
          # Find the docker-compose directory
          COMPOSE_DIR="/Users/zcaeth/actions-runner/actions-runner/_work/atom-sg/atom-sg/05-Backend"
          
          if [ ! -d "$COMPOSE_DIR" ]; then
            echo "Error: Directory $COMPOSE_DIR not found"
            exit 1
          fi
          
          cd "$COMPOSE_DIR"
          
          # Try to find docker in common locations
          DOCKER_CMD=""
          for path in /usr/local/bin/docker /usr/bin/docker /opt/homebrew/bin/docker ~/.docker/bin/docker; do
            if [ -x "$path" ]; then
              DOCKER_CMD="$path"
              echo "Found docker at: $path"
              break
            fi
          done
          
          # Check if docker is available
          if [ -z "$DOCKER_CMD" ] && command -v docker &> /dev/null; then
            DOCKER_CMD="docker"
            echo "Found docker in PATH"
          fi
          
          if [ -n "$DOCKER_CMD" ]; then
            echo "Docker found, rebuilding nginx..."
            $DOCKER_CMD compose up -d --build nginx || $DOCKER_CMD-compose up -d --build nginx
          else
            echo "Docker not found. Common locations checked:"
            ls -la /usr/local/bin/docker 2>/dev/null || echo "  /usr/local/bin/docker: not found"
            ls -la /usr/bin/docker 2>/dev/null || echo "  /usr/bin/docker: not found"
            ls -la /opt/homebrew/bin/docker 2>/dev/null || echo "  /opt/homebrew/bin/docker: not found"
            echo "PATH: $PATH"
            exit 1
          fi
          
          echo "Nginx deployment complete!"

      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MESSAGE="✅ *Nginx Deployed*%0A%0ANginx configuration updated successfully.%0A%0AChanges:%0A- client_max_body_size: 10M (fixes upload errors)"
          else
            MESSAGE="❌ *Nginx Deploy Failed*%0A%0ACheck the workflow logs for details."
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            -d "message_thread_id=54" \
            -d "text=$MESSAGE"
