name: Frontend Visual

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

concurrency:
  group: frontend-visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual:
    name: Visual Regression
    runs-on: self-hosted
    defaults:
      run:
        working-directory: 05-Backend/playwright-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: 05-Backend/playwright-tests/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run visual regression
        run: npm run test:visual
        env:
          BASE_URL: http://192.168.2.6
          CI: true

      - name: Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-visual-artifacts
          path: |
            05-Backend/playwright-tests/test-results/
            05-Backend/playwright-tests/playwright-report/
            05-Backend/playwright-tests/screenshots/
          retention-days: 14
