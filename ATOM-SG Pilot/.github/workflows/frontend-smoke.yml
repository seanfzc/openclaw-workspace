name: Frontend Smoke

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: frontend-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  smoke:
    name: Frontend Smoke
    runs-on: self-hosted
    defaults:
      run:
        working-directory: 05-Backend/playwright-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: 05-Backend/playwright-tests/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run smoke test
        id: smoke
        continue-on-error: true
        run: npm run test:smoke
        env:
          BASE_URL: http://192.168.2.6
          CI: true

      - name: Build failure summary
        if: steps.smoke.outcome == 'failure'
        id: failure_summary
        shell: bash
        run: |
          set -euo pipefail
          node <<'EOF'
          const fs = require('fs');
          const outputPath = process.env.GITHUB_OUTPUT;
          const reportPath = 'test-results/test-results.json';
          let body = '';

          if (fs.existsSync(reportPath)) {
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const failedTests = [];

            const walkSpec = (spec, suiteParts) => {
              const titleParts = [...suiteParts, spec.title].filter(Boolean);
              for (const t of spec.tests || []) {
                if (t.status !== 'failed') continue;
                const failedResult = (t.results || []).find((r) => r.status === 'failed') || (t.results || [])[0] || {};
                const err = (failedResult.error && (failedResult.error.stack || failedResult.error.message || failedResult.error.value)) || 'Unknown error';
                failedTests.push({
                  title: titleParts.join(' > '),
                  project: t.projectName || 'unknown-project',
                  error: String(err).trim(),
                });
              }
            };

            const walkSuite = (suite, parentParts = []) => {
              const next = suite.title ? [...parentParts, suite.title] : parentParts;
              for (const spec of suite.specs || []) walkSpec(spec, next);
              for (const child of suite.suites || []) walkSuite(child, next);
            };

            for (const suite of report.suites || []) walkSuite(suite);

            if (failedTests.length > 0) {
              const first = failedTests[0];
              body = [
                '### Frontend Smoke Failure',
                '',
                `- **Project:** \`${first.project}\``,
                `- **Test:** \`${first.title}\``,
                '',
                '**Error Stack / Message:**',
                '```text',
                first.error.slice(0, 12000),
                '```',
                '',
                `Run artifacts: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              ].join('\n');
            }
          }

          if (!body) {
            body = [
              '### Frontend Smoke Failure',
              '',
              'Smoke test failed but no structured failure was found in `test-results/test-results.json`.',
              '',
              `Run artifacts: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            ].join('\n');
          }

          fs.appendFileSync(outputPath, `comment_body<<EOT\n${body}\nEOT\n`);
          EOF

      - name: Comment failure on PR
        if: steps.smoke.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          FAILURE_BODY: ${{ steps.failure_summary.outputs.comment_body }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: process.env.FAILURE_BODY
            });

      - name: Create issue on push failure
        if: steps.smoke.outcome == 'failure' && github.event_name == 'push'
        uses: actions/github-script@v7
        env:
          FAILURE_BODY: ${{ steps.failure_summary.outputs.comment_body }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `Frontend smoke failed on ${context.ref.replace('refs/heads/', '')}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: process.env.FAILURE_BODY
            });

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-smoke-artifacts
          path: |
            05-Backend/playwright-tests/test-results/
            05-Backend/playwright-tests/playwright-report/
          retention-days: 14

      - name: Fail workflow if smoke failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1
