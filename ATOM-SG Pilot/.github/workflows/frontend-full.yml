name: Frontend Full Suite

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * *'

concurrency:
  group: frontend-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-suite:
    name: Full Frontend Regression (Advisory)
    runs-on: self-hosted
    continue-on-error: true
    defaults:
      run:
        working-directory: 05-Backend/playwright-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: 05-Backend/playwright-tests/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run full regression (chromium)
        run: |
          npx playwright test tests/api-integration.spec.ts tests/baseline.spec.ts tests/dashboard.spec.ts tests/glossary.spec.ts tests/navigation.spec.ts tests/p0-p1-fixes.spec.ts tests/practice.spec.ts --project=chromium
        env:
          BASE_URL: http://192.168.2.6
          CI: true

      - name: Upload full-suite artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-full-suite-artifacts
          path: |
            05-Backend/playwright-tests/test-results/
            05-Backend/playwright-tests/playwright-report/
          retention-days: 14
