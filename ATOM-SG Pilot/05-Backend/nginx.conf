# Nginx configuration for ATOM-SG MVP Backend
# Use with Docker Compose or standalone reverse proxy

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    gzip_disable "MSIE [1-6]\.";

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Backend upstream
    upstream backend {
        server backend:5000;  # Docker Compose service name
        # For standalone: server localhost:5000;
    }

    # Main server block
    server {
        listen 80;
        server_name _;  # Replace with your domain
        
        # File upload size limit (10MB for PDF scans)
        client_max_body_size 10M;
        
        # Redirect HTTP to HTTPS (if SSL is configured)
        # return 301 https://$server_name$request_uri;
        
        # Frontend static files
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            
            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
            
            # Security headers for HTML
            location ~* \.html$ {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
        }
        
        # Backend API proxy
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # Health check endpoint (exposed for monitoring)
        location /health {
            proxy_pass http://backend/api/v1/system/health;
            access_log off;
        }
        
        # API documentation
        location /docs {
            proxy_pass http://backend/docs;
        }
        
        # OpenAPI JSON
        location /openapi.json {
            proxy_pass http://backend/openapi.json;
        }
        
        # Renders static files
        location /renders/ {
            alias /usr/share/nginx/html/renders/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # HTTPS server block (uncomment and configure SSL certificates)
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    # 
    #     ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    # 
    #     # HSTS (uncomment after confirming SSL works)
    #     # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # 
    #     # Copy location blocks from HTTP server
    #     # (or include a common configuration file)
    # }
}