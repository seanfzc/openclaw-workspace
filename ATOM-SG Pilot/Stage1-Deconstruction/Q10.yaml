title: "T-shirt Sales - Line Graph with Discount"

question_text: |
  The line graph shows the number of T-shirts sold over 5 days.
  
  (a) Which day sold the most number of T-shirts?
  (b) What is the percentage increase from Day 3 to Day 4 (nearest percent)?
  (c) 16 T-shirts were sold on Day 3 with a discount. Total sales value on Day 3 was $192.
      What was the original price of a T-shirt before discount?

visual_elements:
  type: line_graph
  description: "Line graph showing T-shirt sales for 5 days (Day 1 to Day 5)"
  axes:
    x_axis: "Day (1-5)"
    y_axis: "Number of T-shirts"
  data_points:
    - day: 1
      sales: 60
    - day: 2
      sales: 52
    - day: 3
      sales: 76
    - day: 4
      sales: 95
    - day: 5
      sales: 68
  annotations:
    - "Day 3: 16 T-shirts with discount"
    - "Total sales Day 3: $192"

solution_path:
  part_a:
    description: "Find day with highest sales"
    reasoning: "Scan y-axis values for maximum"
    calculation: "Day 4 has 95 T-shirts (highest)"
    answer: "Day 4"
  part_b:
    description: "Calculate percentage increase from Day 3 to Day 4"
    reasoning: "Percentage increase = (new - old) / old × 100%"
    calculation: "(95 - 76) ÷ 76 × 100% = 19 ÷ 76 × 100% ≈ 25%"
    answer: "25% (nearest percent)"
  part_c:
    description: "Find original price from discounted price"
    reasoning: "Discounted price = $192 for 16 T-shirts, but only 16 were discounted"
    calculation: "Price per discounted T-shirt = $192 ÷ 16 = $12"
    assumption: "Discount was 20% (common discount rate)"
    alternative: "Without discount rate given, assume discount was part of promotion. Price = $12"
    answer: "$12"

