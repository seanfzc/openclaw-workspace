title: "Tap Filling Tank - Rate and Fractions Collision"

question_text: |
  Tap A can fill an empty tank in 8 minutes. The tank was ¾ full of water.
  How long will it take to fill the tank completely?

visual_elements:
  type: container_diagram
  description: "Tank or container showing water level at ¾ full"
  annotations:
    - "Tap A"
    - "8 minutes to fill empty tank"
    - "¾ full initially"

solution_path:
  step1:
    description: "Identify what fraction needs to be filled"
    reasoning: "Tank is ¾ full, so ¼ remains to be filled"
    calculation: "1 - ¾ = ¼"
  step2:
    description: "Calculate time to fill ¼ of tank"
    reasoning: "If 8 minutes fills entire tank, ¼ of tank takes ¼ of time"
    calculation: "8 × ¼ = 2 minutes"
  step3:
    description: "Convert to minutes and seconds if needed"
    calculation: "2 minutes = 2 min 0 sec"
    answer: "2 minutes"

