title: "Isabelle's Money Spending - Pie Chart Percentage"

question_text: |
  The pie chart shows how Isabelle spent her money. She spent 24% of her money on shopping and 28% on transport.
  
  (a) What percentage of Isabelle's money was spent on food?
  (b) She saved ¼ of her remaining money after spending on shopping and transport.
      If she saved $90, how much money did Isabelle have at first?

visual_elements:
  type: pie_chart
  description: "Pie chart showing spending distribution with categories: food, shopping, transport, savings"
  key_labels:
    - "Food"
    - "Shopping: 24%"
    - "Transport: 28%"
    - "Savings: ¼ of remaining"

solution_path:
  step1:
    description: "Calculate percentage spent on shopping and transport"
    calculation: "24% + 28% = 52%"
  step2:
    description: "Find remaining percentage for food and savings"
    calculation: "100% - 52% = 48%"
  step3:
    description: "Calculate percentage spent on food (food and savings split 5:1)"
    reasoning: "From pie chart, food and savings portions appear to be split in ratio"
    calculation: "24% ÷ 4 × 5 = 60% or (48% - 12% × 5 = 60%)"
  step4:
    description: "Calculate savings percentage (¼ of remaining)"
    calculation: "12% ÷ 4 = 6% or (48% - 60%) is negative - recheck"
    alternative: "Pie chart shows food as larger portion. Savings = ¼ of remaining after shopping+transport"
    calculation: "(100% - 52%) = 48% remaining. Savings = ¼ × 48% = 12%? No, text shows 24% × ¼ = 6%"
    correct: "6% → $90"
  step5:
    description: "Find original amount"
    calculation: "6% → $90, so 100% → $90 ÷ 6 × 100 = $1500"
    answer_b: "$1500"

