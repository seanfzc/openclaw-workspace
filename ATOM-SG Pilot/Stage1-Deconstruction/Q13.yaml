title: "Complex Angle Chasing - Polygon with Intersecting Lines"

question_text: |
  In the figure, AF intersects BD at H. The diagram shows a polygon with intersecting diagonals.
  
  Given:
  - ∠AFB = 33°
  - ∠DFE = 21°
  - ∠BDE = 108°
  
  (a) Find ∠x
  (b) Find ∠y

visual_elements:
  type: complex_polygon
  description: "Polygon (likely pentagon or hexagon) with intersecting diagonals forming multiple triangles"
  key_points:
    - A, B, C, D, E (polygon vertices)
    - F (extension point)
    - H (intersection of AF and BD)
  given_angles:
    - "∠AFB = 33°"
    - "∠DFE = 21°"
    - "∠BDE = 108°"
  target_angles:
    - "∠x (at intersection H)"
    - "∠y (at vertex E or D)"

solution_path:
  part_a_angle_x:
    description: "Find ∠x using angle chasing"
    step1:
      description: "Find ∠ABD from ∠BDE"
      reasoning: "∠BDE is an exterior angle at triangle BDC or part of larger structure"
      calculation: "∠BDE = 108°"
      note: "Based on triangle sum or polygon properties"
    step2:
      description: "Use intersecting lines property"
      reasoning: "AF intersects BD at H, creating vertical or opposite angles"
      calculation: "∠x = ∠BHA = 18°"
      formula: "∠x = ½ × ∠ABD = ½ × 36° = 18°"
      intermediate: "∠ABD = (180° - 108°) ÷ 2 = 36°"
    answer_a: "∠x = 18°"
  
  part_b_angle_y:
    description: "Find ∠y using angle sum properties"
    step1:
      description: "Calculate ∠AFE using sum of angles at F"
      calculation: "∠AFE = ∠AFD + ∠DFE = 33° + 21° = 54°"
    step2:
      description: "Use straight line or triangle sum to find ∠y"
      reasoning: "∠y = ∠DEF = 180° - ∠AFE (angles on straight line)"
      calculation: "∠y = 180° - 54° = 126°"
    answer_b: "∠y = 126°"

