# ATOM-SG Pilot MVP - Docker Compose
# For development and production deployment

version: '3.8'

services:
  atom-sg-backend:
    build:
      context: ../
      dockerfile: deployment/Dockerfile
    container_name: atom-sg-pilot
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - HOST=0.0.0.0
      - DEBUG=false
      # OCR language configuration
      - TESSERACT_LANG=eng
      # Rendering options
      - RENDER_FORMAT=svg
      # Optional: Database connection (if added later)
      # - DATABASE_URL=sqlite:///app/data/atom-sg.db
    volumes:
      # Persist artifacts across container restarts
      - atom-sg-artifacts:/home/appuser/app/artifacts
      # Mount local development code (for development only)
      # - ../05-Backend:/home/appuser/app:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/system/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - atom-sg-network

  # Future services (optional):
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - atom-sg-backend
