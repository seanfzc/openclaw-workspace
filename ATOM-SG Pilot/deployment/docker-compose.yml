  #     - atom-sg-network

  # postgres:
  #   image: postgres:15-alpine
  #   environment:
  #     - POSTGRES_DB=atom_sg
  #     - POSTGRES_USER=atom_sg_user
  #     - POSTGRES_PASSWORD=change_this_password
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
