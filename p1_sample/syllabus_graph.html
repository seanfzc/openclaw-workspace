<!DOCTYPE html>
<html>
<head>
    <title>Primary 1 Maths Syllabus Knowledge Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
            background: #f5f5f5;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 95vh;
        }
        .header {
            margin-bottom: 20px;
        }
        .graph-container {
            flex: 1;
            border: 1px solid #ccc;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        .controls {
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        .node {
            cursor: pointer;
        }
        .node.skill {
            stroke: #333;
            stroke-width: 2px;
        }
        .node.paper {
            stroke: #333;
            stroke-width: 2px;
            stroke-dasharray: 5,5;
        }
        .link {
            stroke: #999;
            stroke-opacity: 0.6;
        }
        .link.tests {
            stroke: #ff6b6b;
        }
        .link.prerequisite {
            stroke: #4ecdc4;
        }
        .tooltip {
            position: absolute;
            padding: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border-radius: 4px;
            pointer-events: none;
            font-size: 14px;
            max-width: 300px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Primary 1 Maths Syllabus Knowledge Graph</h1>
            <p>83 syllabus skills (circles) × 10 exam papers (diamonds). Red edges: paper tests skill. Blue edges: skill prerequisite.</p>
            
            <div class="controls">
                <button id="reset-view">Reset View</button>
                <button id="toggle-papers">Toggle Papers</button>
                <button id="toggle-prerequisites">Toggle Prerequisites</button>
                <label>
                    <input type="checkbox" id="show-labels" checked> Show Labels
                </label>
            </div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #4ecdc4;"></div>
                    <span>Skill Nodes</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff6b6b; border: 1px dashed #333;"></div>
                    <span>Paper Nodes</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff6b6b; height: 2px; width: 20px; margin-top: 8px;"></div>
                    <span>Tests (paper → skill)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #4ecdc4; height: 2px; width: 20px; margin-top: 8px;"></div>
                    <span>Prerequisite (skill → skill)</span>
                </div>
            </div>
        </div>
        
        <div class="graph-container">
            <svg id="graph-svg"></svg>
        </div>
    </div>
    
    <div class="tooltip" id="tooltip"></div>
    
    <script>
        // Graph data will be loaded here
        let graphData = {
            nodes: [],
            edges: []
        };
        
        // Load the graph data
        async function loadGraphData() {
            try {
                const response = await fetch('knowledge_graph.json');
                const data = await response.json();
                graphData = data;
                initGraph();
            } catch (error) {
                console.error('Error loading graph data:', error);
                // Fallback to minimal data
                graphData = {
                    nodes: [{id: 'error', label: 'Error loading data', type: 'error'}],
                    edges: []
                };
                initGraph();
            }
        }
        
        // Initialize the graph
        function initGraph() {
            const width = document.querySelector('.graph-container').clientWidth;
            const height = document.querySelector('.graph-container').clientHeight;
            
            // Clear previous
            d3.select('#graph-svg').selectAll('*').remove();
            
            const svg = d3.select('#graph-svg')
                .attr('width', width)
                .attr('height', height);
            
            // Create zoom behavior
            const zoom = d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });
            
            svg.call(zoom);
            
            // Create main group
            const g = svg.append('g');
            
            // Create simulation
            const simulation = d3.forceSimulation(graphData.nodes)
                .force('link', d3.forceLink(graphData.edges)
                    .id(d => d.id)
                    .distance(d => {
                        if (d.type === 'tests') return 100;
                        if (d.type === 'prerequisite') return 60;
                        return 80;
                    })
                )
                .force('charge', d3.forceManyBody().strength(-300))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(30));
            
            // Create links
            const link = g.append('g')
                .selectAll('line')
                .data(graphData.edges)
                .enter()
                .append('line')
                .attr('class', d => `link ${d.type}`)
                .attr('stroke-width', 1.5);
            
            // Create nodes
            const node = g.append('g')
                .selectAll('g')
                .data(graphData.nodes)
                .enter()
                .append('g')
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));
            
            // Add shapes based on node type
            node.each(function(d) {
                const el = d3.select(this);
                if (d.type === 'skill') {
                    el.append('circle')
                        .attr('r', 8)
                        .attr('fill', '#4ecdc4')
                        .attr('stroke', '#333')
                        .attr('stroke-width', 1);
                } else if (d.type === 'paper') {
                    el.append('rect')
                        .attr('width', 16)
                        .attr('height', 16)
                        .attr('x', -8)
                        .attr('y', -8)
                        .attr('fill', '#ff6b6b')
                        .attr('stroke', '#333')
                        .attr('stroke-width', 1)
                        .attr('stroke-dasharray', '5,5');
                } else {
                    el.append('circle')
                        .attr('r', 10)
                        .attr('fill', '#ccc');
                }
            });
            
            // Add labels
            const label = node.append('text')
                .text(d => d.label.length > 30 ? d.label.substring(0, 30) + '...' : d.label)
                .attr('text-anchor', 'middle')
                .attr('dy', d => d.type === 'paper' ? 25 : 20)
                .attr('font-size', '10px')
                .attr('fill', '#333')
                .attr('class', 'node-label');
            
            // Tooltip
            const tooltip = d3.select('#tooltip');
            
            node.on('mouseover', function(event, d) {
                tooltip.style('display', 'block')
                    .html(`
                        <strong>${d.label}</strong><br/>
                        Type: ${d.type}<br/>
                        ${d.category ? 'Category: ' + d.category : ''}<br/>
                        ${d.subcategory ? 'Subcategory: ' + d.subcategory : ''}<br/>
                        ${d.year ? 'Year: ' + d.year : ''}<br/>
                        ID: ${d.id}
                    `);
            })
            .on('mousemove', function(event) {
                tooltip.style('left', (event.pageX + 10) + 'px')
                    .style('top', (event.pageY - 10) + 'px');
            })
            .on('mouseout', function() {
                tooltip.style('display', 'none');
            });
            
            // Update simulation on tick
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);
                
                node
                    .attr('transform', d => `translate(${d.x},${d.y})`);
            });
            
            // Drag functions
            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }
            
            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }
            
            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            }
            
            // Control buttons
            document.getElementById('reset-view').addEventListener('click', () => {
                svg.transition()
                    .duration(750)
                    .call(zoom.transform, d3.zoomIdentity);
            });
            
            document.getElementById('toggle-papers').addEventListener('click', () => {
                const papersVisible = node.filter(d => d.type === 'paper').style('display');
                const newDisplay = papersVisible === 'none' ? 'block' : 'none';
                node.filter(d => d.type === 'paper').style('display', newDisplay);
            });
            
            document.getElementById('toggle-prerequisites').addEventListener('click', () => {
                const prereqVisible = link.filter(d => d.type === 'prerequisite').style('display');
                const newDisplay = prereqVisible === 'none' ? 'block' : 'none';
                link.filter(d => d.type === 'prerequisite').style('display', newDisplay);
            });
            
            document.getElementById('show-labels').addEventListener('change', (e) => {
                label.style('display', e.target.checked ? 'block' : 'none');
            });
        }
        
        // Load data and initialize
        loadGraphData();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            initGraph();
        });
    </script>
</body>
</html>
